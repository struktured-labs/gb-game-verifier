# Penta Dragon (J) — Memory address config for GB Game Verifier
name: "Penta Dragon"
platform: "GB"  # GB or GBC

addresses:
  # Hardware registers
  - {addr: 0xFF43, name: "SCX", critical: true, desc: "Background scroll X"}
  - {addr: 0xFF42, name: "SCY", critical: true, desc: "Background scroll Y"}
  - {addr: 0xFF40, name: "LCDC", desc: "LCD control register"}

  # Game state (HRAM)
  - {addr: 0xFFBD, name: "room", desc: "Current room (1-7)"}
  - {addr: 0xFFBE, name: "sara_form", desc: "0=Witch, 1=Dragon"}
  - {addr: 0xFFBF, name: "boss_flag", critical: true, desc: "0=none, 1-8=boss ID"}
  - {addr: 0xFFC0, name: "powerup", desc: "0=none, 1=spiral, 2=shield, 3=turbo"}
  - {addr: 0xFFC1, name: "gameplay", critical: true, desc: "0=menu, 1=playing"}
  - {addr: 0xFFD0, name: "stage_flag", desc: "0=normal, 1=bonus"}

  # Game data (WRAM)
  - {addr: 0xDCB8, name: "section", desc: "Section cycle counter"}
  - {addr: 0xDCDC, name: "hp_sub", desc: "HP sub-counter"}
  - {addr: 0xDCDD, name: "hp_main", desc: "HP main counter"}

# Input sequences for testing
inputs:
  game_start:
    desc: "Navigate to GAME START and press A"
    sequence:
      - {frame: 130, keys: 0x80}  # DOWN
      - {frame: 133, keys: 0x00}
      - {frame: 150, keys: 0x01}  # A
      - {frame: 153, keys: 0x00}

  skip_stage_intro:
    desc: "Press A to skip STAGE 01 screen"
    sequence:
      - {frame: 500, keys: 0x01}
      - {frame: 503, keys: 0x00}
      - {frame: 700, keys: 0x01}
      - {frame: 703, keys: 0x00}
